<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marriage Advice Game</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

<div class="container">

<h1 class="title">💍 Marriage Advice Game</h1>

<div class="scenario-box">
<p id="scenario">Loading scenario...</p>
</div>

<input 
id="name" 
class="input"
placeholder="Enter your name"
/>

<textarea
id="answer"
class="input"
placeholder="Your advice..."
maxlength="120"
></textarea>

<button onclick="submitAdvice()" class="submit-btn">
Submit Advice
</button>

<p class="hint">
Watch the big screen for results!
</p>

</div>

<script src="app.js"></script>

</body>

</html>
