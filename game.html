<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marriage Advice Game - Host</title>

    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  </head>

  <body>
    <div class="game-container">
      <h1 class="game-title">💍 Marriage Advice Game</h1>

      <div class="lobby" id="lobby">
        <h2>Room Code</h2>
        <h1 id="room-code">----</h1>
        <p id="player-count">0 / 100 players joined</p>
        <p id="answer-count" style="display: none"></p>
      </div>

      <div class="scenario-card" id="scenario-card" style="display: none">
        <h2 id="scenario">Waiting for round to start...</h2>
      </div>

      <div class="scenario-card" id="winner-card" style="display: none">
        <h2>🏆 Best Marriage Advice</h2>
        <p id="winner-answer"></p>
        <p id="winner-player"></p>
        <p id="winner-reason"></p>
      </div>

      <div class="scenario-card" id="leaderboard-card" style="display: none">
        <h2>🏆 Leaderboard</h2>
        <div id="leaderboard-list"></div>
      </div>

      <div class="controls">
        <button id="start-game-btn" onclick="startGame()">Start Game</button>

        <button
          id="evaluate-btn"
          style="display: none"
          onclick="evaluateAnswers()"
        >
          Evaluate Answers
        </button>

        <button id="next-round-btn" style="display: none" onclick="nextRound()">
          Next Round
        </button>

        <button
          id="leaderboard-btn"
          onclick="showLeaderboard()"
          style="display: none"
        >
          Show Leaderboard
        </button>

        <button id="reset-btn" style="display: none" onclick="resetGame()">
          Reset Game
        </button>
      </div>

      <div id="answers" class="answers-box"></div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
